schema: spec-driven

context: |
  Tech stack: Rust 2024, Bevy 0.15, bevy_egui.
  Project type: a desktop virtual tabletop prototype with a concrete Bevy ECS bootstrap in src/lib.rs.
  Current planning context lives in plan.md and the current runtime behavior is covered by unit tests in src/lib.rs.
  Prefer small, surgical changes that preserve existing engine and desktop behavior.
  Validate changes with cargo build and cargo test from the repository root.

rules:
  proposal:
    - Keep proposals scoped to one user-visible or engine-level change at a time.
    - Call out whether the change affects engine state, desktop presentation state, or both.
  specs:
    - Describe behavior in terms of tabletop outcomes and observable state transitions.
    - Reuse existing terminology such as tokens, board commands, selection state, and dice history.
  design:
    - Reference existing Bevy ECS resources, queues, and presentation state before introducing new patterns.
  tasks:
    - Include explicit validation steps using cargo build and cargo test when code changes are involved.
